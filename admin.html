<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard-container">
<h1>Admin Dashboard</h1>

<h2>Manage Workers</h2>
<input type="email" id="newWorkerEmail" placeholder="Worker Email">
<input type="password" id="newWorkerPass" placeholder="Worker Password">
<button onclick="addWorker(document.getElementById('newWorkerEmail').value, document.getElementById('newWorkerPass').value)">Add Worker</button>

<table>
  <thead>
    <tr><th>Worker Email</th><th>Action</th></tr>
  </thead>
  <tbody id="workersTable"></tbody>
</table>

<h2>All Orders</h2>
<table>
  <thead>
    <tr><th>Customer</th><th>Item</th><th>Shipping</th><th>Update</th></tr>
  </thead>
  <tbody id="ordersTable"></tbody>
</table>
</div>

<script src="script.js"></script>
<script>
renderWorkers();
renderOrders();
</script>
</body>
</html>
