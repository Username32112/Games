<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Game Logger</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Amazon Game Logger</h1>

<section id="dashboard">
  <h2>Dashboard</h2>
  <table id="playersTable">
    <thead>
      <tr>
        <th>Player</th>
        <th>Items</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- Players will be added dynamically -->
    </tbody>
  </table>
</section>

<section id="logsSection">
  <h2>Logs</h2>
  <table id="logsTable">
    <thead>
      <tr>
        <th>Player</th>
        <th>Action</th>
        <th>Item</th>
        <th>To/From</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
      <!-- Logs will be added dynamically -->
    </tbody>
  </table>
</section>

<!-- Modals -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
