<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Worker Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard-container">
<h1>Worker Dashboard</h1>

<!-- Add Item -->
<div class="card">
  <h2>Add New Item</h2>
  <input type="text" id="itemName" placeholder="Item Name">
  <input type="number" id="itemStock" placeholder="Initial Stock" min="1">
  <button onclick="addItem(document.getElementById('itemName').value, document.getElementById('itemStock').value)">Add Item</button>
</div>

<!-- Worker Items -->
<h2>Your Items</h2>
<div id="workerItems" class="grid-container">
<!-- Populated by JS -->
</div>

<!-- Orders Table -->
<h2>Orders</h2>
<table>
  <thead>
    <tr><th>Customer</th><th>Item</th><th>Shipping</th><th>Update</th></tr>
  </thead>
  <tbody id="ordersTable"></tbody>
</table>

</div>
<script src="script.js"></script>
<script>
renderWorkerItems();
renderOrders();
</script>
</body>
</html>
